services:
  lifeos-api:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: lifeos-api
    restart: unless-stopped
    environment:
      LIFEOS_API_KEY: ${LIFEOS_API_KEY}
      LIFEOS_STORAGE_DIR: /data/backups
      LIFEOS_MAX_UPLOAD_MB: ${LIFEOS_MAX_UPLOAD_MB:-200}
    volumes:
      - ./data/backups:/data/backups
    expose:
      - "8000"
    networks:
      - lifeos-net

  nginx:
    image: nginx:1.27-alpine
    container_name: lifeos-nginx
    restart: unless-stopped
    depends_on:
      - lifeos-api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - lifeos-net

networks:
  lifeos-net:
    driver: bridge
